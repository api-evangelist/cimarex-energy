aid: cimarex-energy
name: Cimarex Energy
description: >-
  Cimarex Energy was an independent oil and gas exploration and production
  company headquartered in Denver, Colorado, with operations focused in the
  Permian Basin and the Mid-Continent. In October 2021 Cimarex Energy
  combined with Cabot Oil & Gas Corporation to form Coterra Energy
  (NYSE: CTRA). No public Cimarex-branded developer APIs exist; all current
  digital channels and any future API offerings are part of Coterra Energy.
